name:                verified-pico-thermal
version:             0.1.0.0
synopsis:            Shake build system for thermal camera project
description:         Build management for Chisel + C++ thermal camera
license:             GPL-3.0-only
author:              Yoshihiro Hasegawa
maintainer:          je-suis-1oeuf-devautour@proton.me
category:            Build
build-type:          Simple

# all the dependencies required to build the project, including Shake and any libraries used in the build scripts
dependencies:
  - base >= 4.20 && < 5
  - shake >= 0.19.3
  - hasmtlib >= 2.8.1
  - directory >= 1.3.7
  - filepath >= 1.4.2
  - process >= 1.6.16
  - text >= 2.0
  - bytestring >= 0.11
  - hslogger >= 1.3.2.0
  - extra >= 1.7.12

# ★here which is the library section, we can specify the source directories and exposed modules if needed.
library:
  source-dirs: src
  #if that's needed, you can specify exposed-modules here

executables:
  shake-build:
    main:                Main.hs
    source-dirs:         app
    # run-time options for better performance, especially when using multiple cores
    dependencies:
      - verified-pico-thermal
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N4

tests:
  shake-test:
    main:                Spec.hs
    source-dirs:         test
    dependencies:
      - tasty >= 1.4
      - tasty-hunit >= 0.10
      - vector >= 0.13
      - verified-pico-thermal # this allows the test suite to access the library code

default-extensions:
  - OverloadedStrings
  - DeriveGeneric
  - LambdaCase