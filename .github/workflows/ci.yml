name: Haskell CI (Stack)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the current target repository
    - name: Checkout repository
      uses: actions/checkout@v4
    
    # 2. Setup Haskell Stack environment
    - name: Setup Haskell Stack
      uses: haskell-actions/setup@v2
      with:
        enable-stack: true
        stack-no-global: true

    # 3. Cache Stack dependencies
    - name: Cache Stack
      uses: actions/cache@v4
      env:
        cache-name: cache-stack
      with:
        # Cache global stack directory and local .stack-work
        path: |
          ~/.stack
          .stack-work
          shake/.stack-work
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('stack.yaml') }}-${{ hashFiles('shake/package.yaml') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.cache-name }}-

    # 4. Initialize Shake build system to generate default template files
    # We do this first so that Main.hs does not overwrite Siunertaq's files later.
    # Note: '|| true' ensures the pipeline continues even if 'stack run init' is configured differently.
    - name: Initialize Shake Build System
      run: stack run init || true

    # 5. Clone the Siunertaq repository into a temporary directory
    # (Used for verification setup below)
    - name: Clone Siunertaq Repository
      uses: actions/checkout@v4
      with:
        repository: 'Yoshyhyrro/Siunertaq'
        path: 'siunertaq_tmp'

    # 6. Replace the generated chisel dummy files with the formal verification project
    - name: Integrate Siunertaq for Chisel Verification
      run: |
        # Remove the template 'chisel' directory generated by Main.hs
        rm -rf chisel
        # Move the cloned Siunertaq repository to be the new 'chisel' directory
        mv siunertaq_tmp chisel

    # 7. Setup Java environment required for Chisel and sbt
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'sbt' # Caches sbt dependencies to speed up subsequent builds

    # 8. Setup SBT CLI environment
    # Since ubuntu-latest (Ubuntu 24.04+) does not pre-install sbt, we explicitly install it here.
    - name: Setup SBT
      uses: sbt/setup-sbt@v1

    # 9. Run Chisel compilation and verification using Siunertaq
    - name: Verify Chisel (sbt compile)
      run: |
        cd chisel
        sbt compile

    # 9.5. Install Yices SMT Solver required for Thermal SMT Tests
    # Corrected the release URL with exact case sensitivity (Yices2 in uppercase).
    - name: Install Yices2
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        
        sudo add-apt-repository ppa:sri-csl/formal-methods -y
        sudo apt-get update
        sudo apt-get install -y yices2
        
        # Verify Yices installation
        yices --version
        
    # 10. Run the main build and test pipeline for C++ testbench and Shake rules
    - name: Build and Test
      run: stack test
