name: Haskell CI (Stack)

on:
  push:
    branches: [ "feature/init" ]
  pull_request:
    branches: [ "feature/init" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the current target repository
    - name: Checkout repository
      uses: actions/checkout@v4
    
    # 2. Setup Haskell Stack environment
    - name: Setup Haskell Stack
      uses: haskell-actions/setup@v2
      with:
        enable-stack: true
        stack-no-global: true

    # 3. Setup Java environment required for Chisel and sbt
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'sbt' # Caches sbt dependencies to speed up subsequent builds

    # 4. Cache Stack dependencies
    - name: Cache Stack
      uses: actions/cache@v4
      env:
        cache-name: cache-stack
      with:
        # Cache global stack directory and local .stack-work
        path: |
          ~/.stack
          .stack-work
          shake/.stack-work
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('stack.yaml') }}-${{ hashFiles('shake/package.yaml') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.cache-name }}-

    # 5. Initialize Shake build system to generate default template files
    # We do this first so that Main.hs does not overwrite Siunertaq's files later.
    # Note: '|| true' ensures the pipeline continues even if 'stack run init' is configured differently.
    - name: Initialize Shake Build System
      run: stack run init || true

    # 6. Clone the Siunertaq repository into a temporary directory
    - name: Clone Siunertaq Repository
      uses: actions/checkout@v4
      with:
        repository: 'Yoshyhyrro/Siunertaq'
        path: 'siunertaq_tmp'

    # 7. Replace the generated chisel dummy files with the formal verification project
    - name: Integrate Siunertaq for Chisel Verification
      run: |
        # Remove the template 'chisel' directory generated by Main.hs
        rm -rf chisel
        # Move the cloned Siunertaq repository to be the new 'chisel' directory
        mv siunertaq_tmp chisel

    # 8. Run Chisel compilation and verification using Siunertaq
    - name: Verify Chisel (sbt compile)
      run: |
        cd chisel
        # Compile the Chisel project and verify its formal models using sbt
        sbt compile

    # 9. Run the main build and test pipeline for C++ testbench and Shake rules
    # Stack automatically picks up the stack.yaml in the root directory
    - name: Build and Test
      run: stack test