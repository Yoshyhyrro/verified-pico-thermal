name: Haskell CI (Stack)

on:
  push:
    branches: [ "release/v0.0.1" ]
    # Release is triggered by pushing a version tag: git tag v0.0.1 && git push --tags
    tags:    [ "v*.*.*" ]
  pull_request:
    branches: [ "release/v0.0.1" ]

permissions:
  contents: write  # Required to create GitHub Releases and upload assets

jobs:
  build:
    runs-on: ubuntu-latest

    # Z3_LIB_PATH tells Siunertaq's z3-bridge where libz3.so lives.
    # The Maven package io.github.p-org.solvers:z3 provides libz3java.so,
    # but it still needs libz3.so from the system to dlopen at runtime.
    # /usr/lib/x86_64-linux-gnu is where apt install z3 places it on ubuntu-latest.
    env:
      Z3_LIB_PATH: /usr/lib/x86_64-linux-gnu

    steps:
    # 1. Checkout the current target repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Setup Haskell Stack environment
    - name: Setup Haskell Stack
      uses: haskell-actions/setup@v2
      with:
        enable-stack: true
        stack-no-global: true

    # 3. Cache Stack dependencies
    - name: Cache Stack
      uses: actions/cache@v4
      env:
        cache-name: cache-stack
      with:
        path: |
          ~/.stack
          .stack-work
          shake/.stack-work
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('stack.yaml') }}-${{ hashFiles('shake/package.yaml') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.cache-name }}-

    # 4. Install system dependencies
    # - z3 + libz3-dev : Siunertaq z3-bridge needs libz3.so at JNI runtime (step 11)
    # - yices2         : required by both hasmtlib (stack test, step 12)
    #                    and Siunertaq yices-bridge (step 11)
    # Must be installed before any sbt or stack test invocations.
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y software-properties-common

        sudo apt-get install -y z3 libz3-dev

        sudo add-apt-repository ppa:sri-csl/formal-methods -y
        sudo apt-get update -qq
        sudo apt-get install -y yices2

        z3 --version
        yices --version

    # 5. Initialize Shake build system to generate the project skeleton
    # Runs the "init" phony rule in Main.hs, which:
    #   - Creates chisel/src/main/scala/{i2c,thermal,top}/, cpp/, verilog/ etc.
    #   - Writes chisel/build.sbt  (Scala 2.13 + chisel3 3.6.0 + chiseltest 0.6.0)
    #   - Writes cpp/CMakeLists.txt and MLX90640 testbench stubs
    # Must run before step 7 so that the chisel/ directory skeleton exists.
    # 'stack run -- init' builds the shake-build executable first if necessary,
    # then passes "init" as a target argument to Shake.
    - name: Initialize Shake Build System
      run: stack run -- init

    # 6. Clone the Siunertaq repository into siunertaq/
    # Siunertaq is a Scala 3 BSD quiver + SMT threshold verifier.
    # It is NOT a Chisel project and must live in siunertaq/, not chisel/.
    #   chisel/    — Chisel3 RTL  (Scala 2.13, chisel3/chiseltest)
    #   siunertaq/ — BSD quiver + Z3/Yices verification (Scala 3.8, Pekko)
    - name: Clone Siunertaq Repository
      uses: actions/checkout@v4
      with:
        repository: 'Yoshyhyrro/Siunertaq'
        path: 'siunertaq'

    # 7. Deploy Chisel RTL sources from shake/test/Chisel/ into chisel/src/
    # shake/test/Chisel/ is the committed home for hand-written Chisel hardware.
    # Shake's init (step 5) creates the directory skeleton but does not populate
    # .scala files; this step is the canonical way to deploy RTL into the sbt project.
    #
    # Layout mirrors chisel/src/main/scala/:
    #   shake/test/Chisel/i2c/     → chisel/src/main/scala/i2c/
    #   shake/test/Chisel/thermal/ → chisel/src/main/scala/thermal/
    #   shake/test/Chisel/top/     → chisel/src/main/scala/top/
    #
    # Shake's verilog/generated/*.v rule runs:
    #   cd chisel && sbt "runMain top.<ModuleName>"
    # so each RTL module needs an App object in package top.
    - name: Deploy Chisel RTL Sources
      run: |
        SRC="shake/test/Chisel"
        DST="chisel/src/main/scala"

        for pkg in i2c thermal top; do
          if compgen -G "$SRC/$pkg/*.scala" > /dev/null 2>&1; then
            cp -v "$SRC/$pkg/"*.scala "$DST/$pkg/"
          fi
        done

        # Flat .scala files at the root of shake/test/Chisel/ fall back to top/
        if compgen -G "$SRC/*.scala" > /dev/null 2>&1; then
          cp -v "$SRC/"*.scala "$DST/top/"
        fi

    # 8. Setup Java environment required for Chisel and sbt
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'sbt'

    # 9. Setup SBT CLI environment
    # ubuntu-latest (Ubuntu 24.04+) does not pre-install sbt
    - name: Setup SBT
      uses: sbt/setup-sbt@v1

    # 10. Compile Chisel RTL (Scala 2.13 + chisel3 3.6.0)
    # Verifies that the RTL sources deployed in step 7 are syntactically correct.
    # sbt test (chiseltest simulation) is a separate concern and is not run here.
    - name: Compile Chisel RTL
      run: |
        cd chisel
        sbt compile

    # 11. Compile and verify Siunertaq (Scala 3.8 + Z3/Yices/Pekko bridges)
    # Runs two independent SMT verification lanes over the threshold constraint AST:
    #   core/testOnly io.siunertaq.threshold.* — arithmetic IR + BSD quiver tests
    #   z3Bridge/compile                        — Z3 JNI bridge (compile-only;
    #                                             JNI runtime test deferred to local)
    #   yicesBridge/test                        — Yices 2 SMT-LIB2 subprocess lane
    #                                             (RUN_YICES_SMOKE=1 runs full suite)
    # Z3_LIB_PATH (set at job level) resolves libz3.so installed in step 4.
    - name: Compile and Verify Siunertaq
      env:
        RUN_YICES_SMOKE: '1'
      run: |
        cd siunertaq
        sbt \
          "core/testOnly io.siunertaq.threshold.*" \
          "z3Bridge/compile" \
          "yicesBridge/test"

    # 12. Build C++ testbench and run Haskell SMT tests
    # stack test runs shake/test/Spec.hs which exercises:
    #   - shake/src/ThermalSMT.hs via hasmtlib + Yices2 (installed in step 4)
    #   - The MLX90640 I2C C++ testbench via Shake's "test" phony rule
    - name: Build and Test
      run: stack test

    # 13. Build release artifacts via Shake's "release" phony rule
    # Only runs on a version tag push (v*.*.*); skipped for branch builds.
    # Shake's "release" rule:
    #   - Builds libmlx90640_model.so (C++26 on Ubuntu 26, C++17 otherwise)
    #   - Generates Verilog (I2CMaster.v, ThermalNormalizer.v)
    #   - Generates FIRRTL  (I2CMaster.fir, ThermalNormalizer.fir)
    #   - Stages everything into dist/ and packs verified-pico-thermal.tar.gz
    - name: Build Release Artifacts
      if: startsWith(github.ref, 'refs/tags/v')
      run: stack run -- release

    # 14. Create GitHub Release and upload tarball
    # The release name is the tag (e.g. v0.0.1).
    # softprops/action-gh-release reads GITHUB_TOKEN from the environment;
    # the "contents: write" permission set above is required.
    - name: Publish GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        # Tag name becomes the release title (v0.0.1, v0.1.0, …)
        name: ${{ github.ref_name }}
        # Auto-generate release notes from commits since the previous tag
        generate_release_notes: true
        files: |
          dist/verified-pico-thermal.tar.gz