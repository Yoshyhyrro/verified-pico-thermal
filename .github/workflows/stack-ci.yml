name: Stack CI

on:
  push:
    branches: [feature/init]
  pull_request:
    branches: [feature/init]

env:
  STACK_YAML: shake/stack.yaml

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Haskell Stack
      uses: haskell-actions/setup@v2
      with:
        enable-stack: true
        stack-version: 'latest'
    
    - name: Setup Java (for Chisel)
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'
    
    - name: Setup sbt
      uses: actions/setup-sbt@v1
    
    - name: Setup CMake
      run: sudo apt-get install -y cmake
    
    - name: Cache Stack
      uses: actions/cache@v3
      with:
        path: |
          ~/.stack
          shake/.stack-work
        key: ${{ runner.os }}-stack-${{ hashFiles('shake/stack.yaml') }}
        restore-keys: |
          ${{ runner.os }}-stack-
    
    - name: Build Shake executable
      run: |
        cd shake
        stack build --system-ghc --no-terminal
    
    - name: Run CI build
      run: |
        cd shake
        stack exec shake-build -- ci
    
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: |
          build/
          verilog/generated/
          cpp/build/
          test-results.log