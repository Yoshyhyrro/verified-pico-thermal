name: Verify Thermal SMT Pipeline

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Yices
        run: python -m pip install yices-solver
      - name: Run verification tests
        run: python -m unittest discover -s tests -v
